<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Técnico WEB</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <h1 class="titulo-principal">
        Simuladores Matemáticos Interactivos
    </h1>

    <!-- EJERCICIO 1 -->

    <section class="contenedor">

        <h2>Transferencia de Calor</h2>

        <p class="formula">
            T = Ts + (T0 - Ts) * e<sup>-kt</sup>
        </p>

        <form>

            <div class="campo">
                <label for="T0">
                    Temperatura inicial (T0)
                </label>

                <input
                    type="number"
                    id="T0"
                    value="120"
                    step="any"
                    required
                >
            </div>

            <div class="campo">
                <label for="Ts">
                    Temperatura del entorno (Ts)
                </label>

                <input
                    type="number"
                    id="Ts"
                    value="38"
                    step="any"
                    required
                >
            </div>

            <div class="campo">
                <label for="k">
                    Constante (k)
                </label>

                <input
                    type="number"
                    id="k"
                    value="0.45"
                    step="any"
                    required
                >
            </div>

            <div class="campo">
                <label for="t">
                    Tiempo en horas (t)
                </label>

                <input
                    type="number"
                    id="t"
                    value="3"
                    step="any"
                    required
                >
            </div>

            <button type="button" onclick="calcularTemperatura()">
                Calcular Temperatura
            </button>

        </form>

        <div class="resultado" id="resultadoTemp">

            <p>Temperatura final:</p>

            <span id="valorTemp"></span>

        </div>

    </section>

    <!-- EJERCICIO 2 -->

    <section class="contenedor">

        <h2>Calculador de Combinaciones</h2>

        <p class="formula">
            C(n,r) = n! / (r!(n-r)!)
        </p>

        <form>

            <div class="campo">
                <label for="n1">
                    Grupo 1 - n1
                </label>

                <input
                    type="number"
                    id="n1"
                    value="59"
                    min="1"
                    max="59"
                    required
                >
            </div>

            <div class="campo">
                <label for="r1">
                    Grupo 1 - r1
                </label>

                <input
                    type="number"
                    id="r1"
                    value="5"
                    min="1"
                    max="59"
                    required
                >
            </div>

            <div class="campo">
                <label for="n2">
                    Grupo 2 - n2
                </label>

                <input
                    type="number"
                    id="n2"
                    value="35"
                    min="1"
                    max="35"
                    required
                >
            </div>

            <div class="campo">
                <label for="r2">
                    Grupo 2 - r2
                </label>

                <input
                    type="number"
                    id="r2"
                    value="1"
                    min="1"
                    max="35"
                    required
                >
            </div>

            <button type="button" onclick="calcularCombinaciones()">
                Calcular Combinaciones
            </button>

        </form>

        <div class="resultado" id="resultadoComb">

            <p>Total de combinaciones:</p>

            <span id="valorComb"></span>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>
</html>
